<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an Account</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="cuerpoCreateAccount">

    <!--formulario para crear una cuenta-->
    <div class="contenedor-base">
        <h3>Create an Account</h3>
        <div>
            <form action="PrincipalPage.html" class="Formulario-Create">
                <p>Name</p>
                <input type="text" placeholder="Name">
                <p>Last name</p>
                <input type="text" placeholder="Last Name">
                <p>Date of birth</p>
                <input type="date">
                <p>Enter an email</p>
                <input type="email" placeholder="Example@gmail.com">
                <p>Create a password</p>
                <input type="password" placeholder="Create a password">
                <p>Repeat the password</p>
                <input type="password" placeholder="Repeat the password">
                <input type="submit" value="Create" class="bton-LogIn">
            </form>
        </div>
    </div>
    
    <script src="JavaScript/Script.js"></script>
</body>
</html>
