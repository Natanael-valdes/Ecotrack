<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTrack</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="cuerpoIndex">
    <!--titulo-->
    <div>
        <h1 class="titulo">EcoTrack</h1>
        <h3 class="eslogan">Let´s help the planet together, <br>
             one step at a time</h3>
    </div>

    <div>
        <!--Conenedor del Log In-->
        <div class="contenedor-base">
            <h2>Log In</h2>
            <!--Formulario-->
            <form action="components/PrincipalPage.html" class="formulario-LogIn">
                <input type="email" placeholder="Example@gmail.com">

                <input type="password" placeholder="password">

                <input type="submit" value="Log in" class="bton-LogIn">

            </form>

            <button class="bton-flotante" onclick="BtonPassword()">Reestore your password</button>

            <!--INiciar sesion con otros-->
            <p>Log In with others</p>

            <div class="Others-ways">
            <!--imagenes de google y microsoft-->

                <img src="" alt="google">
                <img src="" alt="microsoft">
            </div>

             <!--Crear cuenta-->
            <div>
                <p>You don't have an account?</p>
                <button class="createAccount" onclick="BotonMover()">Create an account</button>
            </div>

        </div>

    </div>
<script src="JavaScript/Script.js"></script>
</body>
</html>
