<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>

    <link rel="stylesheet" href="assets/css/index.css">
</head>
<body class="cuerpo-Index">

    <div class="contenedor-Login">

        <!--Logo, collage, slogan-------------------------------------------------------------->
        <section class="izquierda-Login">

            <!--Logo-->
            <img src="#" alt="Eco Logo" class="logo">

            <!--Eslogan-->
            <h2>Let´s help<br>
                the planet<br>
                together,<br>one <span>Track</span> at a time
            </h2>

            <img src="#" alt="Collage" class="collage">

        </section>

        <!--Formulario-------------------------------------------------------------------------->
        <section class="derecha">

            <div class="login">

                <h2>Log in to EcoTrack</h2>


                <form action="components/PrincipalPage.html">

                    <input type="text" placeholder="Email or Phone number">

                    <input type="password" placeholder="password">

                    <input type="submit" value="Log in" class="botoncito">
                </form>

                <a href="components/changepassword.html">Forgotten password?</a>

                <button class="crear">
                    Create new account
                </button>

                <p class="meta">
                    ®EcoTrack
                </p>
            </div>
        </section>

    </div>
    
</body>
</html>
